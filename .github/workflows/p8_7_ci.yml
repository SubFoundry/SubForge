name: p8-7-ci

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality-gate:
    name: quality-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - windows-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Cargo fmt check
        run: cargo fmt --all -- --check
      - name: Cargo check
        run: cargo check --workspace
      - name: Cargo test
        run: cargo test --workspace

  core-release:
    name: core-release-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs:
      - quality-gate
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - windows-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build subforge-core release
        run: cargo build -p subforge-core --release
      - name: Upload core binary (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: subforge-core-${{ matrix.os }}
          path: target/release/subforge-core.exe
      - name: Upload core binary (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: subforge-core-${{ matrix.os }}
          path: target/release/subforge-core

  desktop-pipeline-smoke:
    name: desktop-pipeline-smoke-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs:
      - quality-gate
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - windows-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux desktop build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - uses: pnpm/action-setup@v4
        with:
          version: 10.27.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
      - name: Desktop Tauri build smoke (no bundle)
        run: pnpm -C apps/desktop tauri build --ci --no-bundle
      - name: Upload desktop binary (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: subforge-desktop-${{ matrix.os }}
          path: target/release/subforge-desktop-tauri.exe
      - name: Upload desktop binary (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: subforge-desktop-${{ matrix.os }}
          path: target/release/subforge-desktop-tauri
