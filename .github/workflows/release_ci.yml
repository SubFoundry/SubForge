name: release-ci

on:
  push:
    branches:
      - main
      - develop
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  RELEASE_ARTIFACT_RETENTION_DAYS: 14
  PNPM_VERSION: 10.32.0
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality-gate:
    name: quality-${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: ubuntu-22.04
            arch: x86_64
          - os: windows-latest
            platform: windows-10
            arch: x86_64
          - os: macos-latest
            platform: macos-13
            arch: arm64
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux desktop build dependencies
        if: runner.os == 'Linux'
        run: |
          export DEBIAN_FRONTEND=noninteractive
          for attempt in 1 2 3; do
            sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf && break
            if [ "$attempt" -eq 3 ]; then
              echo "apt install failed after ${attempt} attempts"
              exit 1
            fi
            sleep $((attempt * 15))
          done
      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          components: rustfmt
      - name: Ensure rustfmt component is available
        run: rustup component add rustfmt --toolchain 1.94.1
      - name: Cargo fmt check
        run: cargo fmt --all -- --check
      - name: Cargo check
        run: cargo check --workspace
      - name: Cargo test
        run: cargo test --workspace

  static-security-gate:
    name: static-security-gate
    runs-on: ubuntu-22.04
    needs:
      - quality-gate
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux desktop build dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          for attempt in 1 2 3; do
            sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf && break
            if [ "$attempt" -eq 3 ]; then
              echo "apt install failed after ${attempt} attempts"
              exit 1
            fi
            sleep $((attempt * 15))
          done
      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          components: clippy
      - name: Ensure clippy component is available
        run: rustup component add clippy --toolchain 1.94.1
      - uses: taiki-e/install-action@cargo-audit
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
      - name: Cargo clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Cargo audit
        run: |
          for attempt in 1 2 3; do
            cargo audit && break
            if [ "$attempt" -eq 3 ]; then
              echo "cargo audit failed after ${attempt} attempts"
              exit 1
            fi
            sleep $((attempt * 20))
          done
      - name: Pnpm audit (high+)
        run: pnpm audit --audit-level=high --registry https://registry.npmjs.org

  core-release:
    name: core-release-${{ matrix.platform }}-${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs:
      - quality-gate
      - static-security-gate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            platform: windows-10
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            platform: macos-13
            target: x86_64-apple-darwin
          - os: macos-latest
            platform: macos-13
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          targets: ${{ matrix.target }}
      - name: Build subforge-core release
        run: cargo build -p subforge-core --release --target ${{ matrix.target }}
      - name: Upload core binary (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: subforge-core-${{ matrix.platform }}-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/subforge-core.exe
          retention-days: ${{ env.RELEASE_ARTIFACT_RETENTION_DAYS }}
      - name: Upload core binary (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: subforge-core-${{ matrix.platform }}-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/subforge-core
          retention-days: ${{ env.RELEASE_ARTIFACT_RETENTION_DAYS }}

  core-release-linux-musl:
    name: core-release-linux-musl
    runs-on: ubuntu-22.04
    needs:
      - quality-gate
      - static-security-gate
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux musl toolchain
        run: |
          export DEBIAN_FRONTEND=noninteractive
          for attempt in 1 2 3; do
            sudo apt-get update && sudo apt-get install -y musl-tools && break
            if [ "$attempt" -eq 3 ]; then
              echo "apt install failed after ${attempt} attempts"
              exit 1
            fi
            sleep $((attempt * 15))
          done
      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          targets: x86_64-unknown-linux-musl
      - name: Build subforge-core release (linux musl)
        run: cargo build -p subforge-core --release --target x86_64-unknown-linux-musl
      - name: Upload core binary (Linux musl)
        uses: actions/upload-artifact@v4
        with:
          name: subforge-core-ubuntu-22.04-x86_64-unknown-linux-musl
          path: target/x86_64-unknown-linux-musl/release/subforge-core
          retention-days: ${{ env.RELEASE_ARTIFACT_RETENTION_DAYS }}

  desktop-pipeline-smoke:
    name: desktop-pipeline-smoke-${{ matrix.platform }}-${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs:
      - quality-gate
      - static-security-gate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            platform: windows-10
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            platform: macos-13
            target: x86_64-apple-darwin
          - os: macos-latest
            platform: macos-13
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux desktop build dependencies
        if: runner.os == 'Linux'
        run: |
          export DEBIAN_FRONTEND=noninteractive
          for attempt in 1 2 3; do
            sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf && break
            if [ "$attempt" -eq 3 ]; then
              echo "apt install failed after ${attempt} attempts"
              exit 1
            fi
            sleep $((attempt * 15))
          done
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          targets: ${{ matrix.target }}
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
      - name: Build subforge-core sidecar
        run: cargo build -p subforge-core --release --target ${{ matrix.target }}
      - name: Prepare desktop sidecar payload
        shell: pwsh
        run: |
          $target = "${{ matrix.target }}"
          $sourceBinary = if ($target -like "*windows*") {
            "target/$target/release/subforge-core.exe"
          } else {
            "target/$target/release/subforge-core"
          }
          if (-not (Test-Path -LiteralPath $sourceBinary)) {
            throw "未找到 sidecar 源文件: $sourceBinary"
          }
          $destDir = "apps/desktop/src-tauri/binaries"
          New-Item -ItemType Directory -Path $destDir -Force | Out-Null
          $destName = if ($target -like "*windows*") {
            "subforge-core-$target.exe"
          } else {
            "subforge-core-$target"
          }
          Copy-Item -LiteralPath $sourceBinary -Destination (Join-Path $destDir $destName) -Force
      - name: Desktop Tauri build smoke (no bundle)
        run: pnpm -C apps/desktop tauri build --ci --no-bundle --target ${{ matrix.target }}
      - name: Upload desktop binary (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: subforge-desktop-${{ matrix.platform }}-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/subforge-desktop-tauri.exe
          retention-days: ${{ env.RELEASE_ARTIFACT_RETENTION_DAYS }}
      - name: Upload desktop binary (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: subforge-desktop-${{ matrix.platform }}-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/subforge-desktop-tauri
          retention-days: ${{ env.RELEASE_ARTIFACT_RETENTION_DAYS }}

  desktop-bundle:
    name: desktop-bundle-${{ matrix.platform }}-${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs:
      - quality-gate
      - static-security-gate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            platform: windows-10
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            platform: macos-13
            target: x86_64-apple-darwin
          - os: macos-latest
            platform: macos-13
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux desktop build dependencies
        if: runner.os == 'Linux'
        run: |
          export DEBIAN_FRONTEND=noninteractive
          for attempt in 1 2 3; do
            sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf && break
            if [ "$attempt" -eq 3 ]; then
              echo "apt install failed after ${attempt} attempts"
              exit 1
            fi
            sleep $((attempt * 15))
          done
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          targets: ${{ matrix.target }}
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
      - name: Build subforge-core sidecar
        run: cargo build -p subforge-core --release --target ${{ matrix.target }}
      - name: Prepare desktop sidecar payload
        shell: pwsh
        run: |
          $target = "${{ matrix.target }}"
          $sourceBinary = if ($target -like "*windows*") {
            "target/$target/release/subforge-core.exe"
          } else {
            "target/$target/release/subforge-core"
          }
          if (-not (Test-Path -LiteralPath $sourceBinary)) {
            throw "未找到 sidecar 源文件: $sourceBinary"
          }
          $destDir = "apps/desktop/src-tauri/binaries"
          New-Item -ItemType Directory -Path $destDir -Force | Out-Null
          $destName = if ($target -like "*windows*") {
            "subforge-core-$target.exe"
          } else {
            "subforge-core-$target"
          }
          Copy-Item -LiteralPath $sourceBinary -Destination (Join-Path $destDir $destName) -Force

      - name: Build desktop bundle (Windows NSIS)
        if: runner.os == 'Windows'
        run: pnpm -C apps/desktop tauri build --ci --bundles nsis --target ${{ matrix.target }}
      - name: Build desktop bundle (macOS DMG)
        if: runner.os == 'macOS'
        run: pnpm -C apps/desktop tauri build --ci --bundles dmg --target ${{ matrix.target }}
      - name: Build desktop bundle (Linux DEB/AppImage)
        if: runner.os == 'Linux'
        run: pnpm -C apps/desktop tauri build --ci --bundles deb,appimage --target ${{ matrix.target }}
      - name: Copy builtin plugins to bundle
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            PLUGIN_RESOURCES_DIR="target/${{ matrix.target }}/release/bundle/nsis/resources"
          elif [ "$RUNNER_OS" = "macOS" ]; then
            PLUGIN_RESOURCES_DIR="target/${{ matrix.target }}/release/bundle/dmg/SubForge.app/Contents/Resources"
          else
            PLUGIN_RESOURCES_DIR="target/${{ matrix.target }}/release/bundle/appimage/resources"
          fi
          mkdir -p "$PLUGIN_RESOURCES_DIR/plugins"
          cp -r plugins/builtins/* "$PLUGIN_RESOURCES_DIR/plugins/"
      - name: Upload NSIS bundle
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: subforge-desktop-${{ matrix.platform }}-${{ matrix.target }}-nsis
          path: target/${{ matrix.target }}/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: ${{ env.RELEASE_ARTIFACT_RETENTION_DAYS }}
      - name: Upload DMG bundle
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: subforge-desktop-${{ matrix.platform }}-${{ matrix.target }}-dmg
          path: target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: ${{ env.RELEASE_ARTIFACT_RETENTION_DAYS }}
      - name: Upload DEB bundle
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: subforge-desktop-${{ matrix.platform }}-${{ matrix.target }}-deb
          path: target/${{ matrix.target }}/release/bundle/deb/*.deb
          if-no-files-found: error
          retention-days: ${{ env.RELEASE_ARTIFACT_RETENTION_DAYS }}
      - name: Upload AppImage bundle
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: subforge-desktop-${{ matrix.platform }}-${{ matrix.target }}-appimage
          path: target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
          if-no-files-found: error
          retention-days: ${{ env.RELEASE_ARTIFACT_RETENTION_DAYS }}

  desktop-install-smoke-windows:
    name: desktop-install-smoke-windows
    runs-on: windows-latest
    needs:
      - desktop-bundle
    steps:
      - name: Download NSIS bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: subforge-desktop-windows-10-x86_64-pc-windows-msvc-nsis
          path: dist
      - name: Install and verify desktop bundle auto-starts core
        shell: pwsh
        run: |
          $logDir = Join-Path $env:RUNNER_TEMP "desktop-install-smoke-logs"
          New-Item -ItemType Directory -Path $logDir -Force | Out-Null
          $summaryPath = Join-Path $logDir "smoke-summary.log"
          $snapshotPath = Join-Path $logDir "failure-snapshot.log"
          $transcriptPath = Join-Path $logDir "smoke-transcript.log"
          $installDir = "C:\subforge-install-smoke"
          $desktopProcess = $null
          $desktopProcessName = $null

          Start-Transcript -Path $transcriptPath -Force | Out-Null
          try {
          $installer = Get-ChildItem -Path dist -Filter *.exe -File | Select-Object -First 1
          if (-not $installer) {
            throw "未找到 NSIS 安装包产物"
          }

          Add-Content -Path $summaryPath -Value "installer=$($installer.FullName)"
          Get-Process -Name "subforge-desktop-tauri", "subforge-core", "subforge_core" -ErrorAction SilentlyContinue |
            Stop-Process -Force -ErrorAction SilentlyContinue
          if (Test-Path -LiteralPath $installDir) {
            Remove-Item -LiteralPath $installDir -Recurse -Force
          }
          New-Item -ItemType Directory -Path $installDir | Out-Null

          $installExitCode = $null
          $installArgs = @("/S", "/D=$installDir")
          for ($attempt = 1; $attempt -le 2; $attempt++) {
            $installProc = Start-Process -FilePath $installer.FullName -ArgumentList $installArgs -Wait -PassThru -NoNewWindow
            $installExitCode = $installProc.ExitCode
            if ($installExitCode -eq 0) {
              break
            }
            if ($attempt -lt 2) {
              Start-Sleep -Seconds 2
            }
          }
          Add-Content -Path $summaryPath -Value "install_exit_code=$installExitCode"
          if ($installExitCode -ne 0) {
            throw "静默安装失败，退出码：$installExitCode"
          }

          $desktopExe = $null
          $findDesktopDeadline = (Get-Date).AddSeconds(20)
          while ((Get-Date) -lt $findDesktopDeadline -and -not $desktopExe) {
            $desktopExe = Get-ChildItem -Path $installDir -Filter *.exe -File |
              Where-Object { $_.Name -notin @("subforge-core.exe", "uninstall.exe") } |
              Select-Object -First 1
            if (-not $desktopExe) {
              Start-Sleep -Milliseconds 500
            }
          }
          if (-not $desktopExe) {
            throw "安装目录中未识别到 Desktop 可执行文件"
          }
          Add-Content -Path $summaryPath -Value "desktop_exe=$($desktopExe.FullName)"

          $startInfo = New-Object System.Diagnostics.ProcessStartInfo
          $startInfo.FileName = $desktopExe.FullName
          $startInfo.UseShellExecute = $false
          $startInfo.EnvironmentVariables["SUBFORGE_DESKTOP_PRELOAD_CORE"] = "1"
          $desktopProcess = [System.Diagnostics.Process]::Start($startInfo)
          $desktopProcessName = [System.IO.Path]::GetFileNameWithoutExtension($desktopExe.Name)
          $deadline = (Get-Date).AddSeconds(45)
          $healthy = $false
          while ((Get-Date) -lt $deadline) {
            try {
              $health = Invoke-RestMethod -Uri "http://127.0.0.1:18118/health" -TimeoutSec 3
              if ($health.status -eq "ok") {
                $healthy = $true
                break
              }
            } catch {
              Start-Sleep -Milliseconds 800
            }
          }

          if (-not $healthy) {
            throw "安装包启动后未检测到 Core /health 就绪"
          }
          Add-Content -Path $summaryPath -Value "health_check=ok"

          $uninstaller = Join-Path $installDir "uninstall.exe"
          if (Test-Path -LiteralPath $uninstaller) {
            $uninstallProc = Start-Process -FilePath $uninstaller -ArgumentList @("/S") -Wait -PassThru -NoNewWindow
            Add-Content -Path $summaryPath -Value "uninstall_exit_code=$($uninstallProc.ExitCode)"
            if ($uninstallProc.ExitCode -ne 0) {
              throw "静默卸载失败，退出码：$($uninstallProc.ExitCode)"
            }
          } else {
            Add-Content -Path $summaryPath -Value "uninstall_skip=uninstaller_missing"
          }
          } catch {
            Add-Content -Path $summaryPath -Value "failure=$($_.Exception.Message)"
            Set-Content -Path $snapshotPath -Value "=== Process Snapshot ==="
            Get-Process -Name "subforge-desktop-tauri", "subforge-core", "subforge_core" -ErrorAction SilentlyContinue |
              Select-Object Name, Id, CPU, StartTime |
              Format-Table -AutoSize |
              Out-String |
              Add-Content -Path $snapshotPath
            Add-Content -Path $snapshotPath -Value "=== Port 18118 Listener Snapshot ==="
            Get-NetTCPConnection -LocalPort 18118 -State Listen -ErrorAction SilentlyContinue |
              Select-Object LocalAddress, LocalPort, OwningProcess |
              Format-Table -AutoSize |
              Out-String |
              Add-Content -Path $snapshotPath
            Add-Content -Path $snapshotPath -Value "=== Install Directory Snapshot ==="
            if (Test-Path -LiteralPath $installDir) {
              Get-ChildItem -Path $installDir -Recurse -ErrorAction SilentlyContinue |
                Select-Object FullName, Length |
                Format-Table -AutoSize |
                Out-String |
                Add-Content -Path $snapshotPath
            } else {
              Add-Content -Path $snapshotPath -Value "install_dir_missing"
            }
            throw
          } finally {
            Stop-Process -Name "subforge-core", "subforge_core" -ErrorAction SilentlyContinue
            if ($desktopProcess -and -not $desktopProcess.HasExited) {
              Stop-Process -Id $desktopProcess.Id -Force -ErrorAction SilentlyContinue
            }
            if ($desktopProcessName) {
              Stop-Process -Name $desktopProcessName -ErrorAction SilentlyContinue
            }
            try {
              Stop-Transcript | Out-Null
            } catch {
              # ignore transcript shutdown errors
            }
          }
      - name: Upload desktop install smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-install-smoke-logs-windows-10
          path: ${{ runner.temp }}/desktop-install-smoke-logs
          if-no-files-found: warn
          retention-days: ${{ env.RELEASE_ARTIFACT_RETENTION_DAYS }}
