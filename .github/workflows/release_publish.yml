name: release-publish

on:
  workflow_run:
    workflows:
      - release-ci
    types:
      - completed

permissions:
  contents: write
  actions: read

jobs:
  publish:
    name: publish-release-assets
    runs-on: ubuntu-22.04
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'
    steps:
      - name: Resolve publish channel
        id: channel
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const sha = run.head_sha;
            const branch = run.head_branch;
            let mode = "skip";
            let tag = "";

            if (branch === "main") {
              mode = "prerelease";
              tag = "pre-release";
            } else {
              const tags = await github.paginate(
                github.rest.repos.listTags,
                {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  per_page: 100,
                },
              );
              const matched = tags.find((item) => item.name.startsWith("v") && item.commit?.sha === sha);
              if (matched) {
                mode = "release";
                tag = matched.name;
              }
            }

            core.info(`publish mode=${mode}, tag=${tag || "-"}`);
            core.setOutput("mode", mode);
            core.setOutput("tag", tag);
            core.setOutput("sha", sha);

      - name: Download build artifacts from release-ci run
        if: steps.channel.outputs.mode != 'skip'
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          pattern: subforge-*
          path: release-assets

      - name: Publish pre-release from main
        if: steps.channel.outputs.mode == 'prerelease'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_SHA: ${{ steps.channel.outputs.sha }}
        run: |
          set -euo pipefail
          mapfile -t files < <(find release-assets -type f | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release assets found."
            exit 1
          fi

          notes="Automated pre-release build from main
          
          Commit: ${RELEASE_SHA}
          Source run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${{ github.event.workflow_run.id }}"

          if gh release view pre-release >/dev/null 2>&1; then
            mapfile -t old_ids < <(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/pre-release" --jq '.assets[].id')
            for asset_id in "${old_ids[@]}"; do
              if [ -n "${asset_id}" ]; then
                gh api --method DELETE "repos/${GITHUB_REPOSITORY}/releases/assets/${asset_id}"
              fi
            done
            gh release upload pre-release "${files[@]}" --clobber
            gh release edit pre-release --title "SubForge Pre-release (main)" --prerelease --notes "$notes"
          else
            gh release create pre-release "${files[@]}" \
              --target "${RELEASE_SHA}" \
              --title "SubForge Pre-release (main)" \
              --prerelease \
              --notes "$notes"
          fi

      - name: Publish release from v* tag
        if: steps.channel.outputs.mode == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.channel.outputs.tag }}
        run: |
          set -euo pipefail
          mapfile -t files < <(find release-assets -type f | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release assets found."
            exit 1
          fi

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" "${files[@]}" --clobber
          else
            gh release create "${RELEASE_TAG}" "${files[@]}" \
              --verify-tag \
              --title "${RELEASE_TAG}" \
              --generate-notes \
              --latest
          fi
