proxies:
- name: VLESS-US
  type: vless
  server: vless-us.example.com
  port: 443
  uuid: 22222222-2222-2222-2222-222222222222
  udp: true
  tls: true
  sni: tls.example.com
  servername: tls.example.com
  network: grpc
  flow: xtls-rprx-vision
  grpc-opts:
    grpc-service-name: vless-grpc
proxy-groups:
- name: Select
  type: select
  proxies:
  - Auto
  - US
  - VLESS-US
- name: Auto
  type: url-test
  proxies:
  - VLESS-US
  url: http://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50
- name: US
  type: select
  proxies:
  - VLESS-US
