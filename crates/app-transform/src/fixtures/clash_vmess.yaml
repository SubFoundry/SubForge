proxies:
- name: VMESS-SG
  type: vmess
  server: vmess-sg.example.com
  port: 443
  cipher: auto
  uuid: 11111111-1111-1111-1111-111111111111
  alterId: 0
  udp: true
  tls: true
  sni: tls.example.com
  servername: tls.example.com
  network: ws
  ws-opts:
    path: /ws
    headers:
      Host: edge.example.com
proxy-groups:
- name: Select
  type: select
  proxies:
  - Auto
  - SG
  - VMESS-SG
- name: Auto
  type: url-test
  proxies:
  - VMESS-SG
  url: http://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50
- name: SG
  type: select
  proxies:
  - VMESS-SG
